<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Перемещения и возвращения в ДР Конго</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <aside id="infoPanel" class="panel info-panel" aria-label="Описание карты">
      <div class="info-panel-top">
        <button id="infoToggle" class="info-toggle" type="button" aria-expanded="true">Скрыть</button>
      </div>

      <div id="infoPanelBody" class="info-panel-body">
        <div class="mode-switch" aria-label="Режимы карты">
          <button class="mode-btn is-active" type="button" data-mode="idps">ВПЛ</button>
          <button class="mode-btn" type="button" data-mode="returnees">Возвращенцы</button>
          <button class="mode-btn" type="button" data-mode="balance">Где возвращенцев больше</button>
        </div>

        <div class="info-slides">
          <section class="info-slide is-active">
            <div id="infoCopy" class="info-copy"></div>
          </section>
        </div>
      </div>
    </aside>

    <div id="hoverTooltip" class="hover-tooltip is-hidden" aria-live="polite"></div>

    <aside class="panel legend-panel" aria-label="Легенда карты">
      <div id="legendTitle" class="eyebrow">Интенсивность</div>
      <div id="legendScale" class="legend-scale"></div>
      <div class="legend-range">
        <span id="legendMin">0</span>
        <span id="legendMax">—</span>
      </div>
    </aside>

    <div id="status" class="status">Загрузка данных…</div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
